name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Verify tag and manifest version
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="$(node -p "require('./manifest.json').version")"
          test "$tag" = "$version"
      - name: Build plugin
        run: |
          npm ci
          npm test
          npm run build
      - name: Package plugin
        shell: bash
        run: |
          mkdir -p release/task-manager
          cp main.js manifest.json styles.css release/task-manager/
          cd release
          zip -r ../task-manager.zip task-manager
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "${GITHUB_REF#refs/tags/}" \
            --generate-notes \
            task-manager.zip main.js manifest.json styles.css
