name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Verify tag and manifest version
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="$(node -p "require('./manifest.json').version")"
          test "$tag" = "$version"
      - name: Build plugin
        run: |
          npm ci
          npm test
          npm run build
      - name: Package plugin for manual installation
        shell: bash
        run: |
          mkdir -p release/task-manager
          cp main.js manifest.json styles.css release/task-manager/
          cd release
          zip -r ../task-manager.zip task-manager
      - name: Attest main.js
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: main.js
      - name: Attest styles.css
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: styles.css
      - name: Attest manifest.json
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: manifest.json
      - name: Attest manual installation package
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: task-manager.zip
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: |
            task-manager.zip
            main.js
            manifest.json
            styles.css
