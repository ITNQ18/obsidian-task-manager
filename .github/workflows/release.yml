name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Verify tag and manifest version
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="$(node -p "require('./manifest.json').version")"
          test "$tag" = "$version"
      - name: Build plugin
        run: |
          npm ci
          npm test
          npm run build
      - name: Package plugin for manual installation
        shell: bash
        run: |
          mkdir -p release/task-manager
          cp main.js manifest.json styles.css release/task-manager/
          cd release
          zip -r ../task-manager.zip task-manager
      - name: Attest Obsidian release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            task-manager.zip
            styles.css
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          draft: true
          generate_release_notes: true
          files: |
            task-manager.zip
            main.js
            manifest.json
            styles.css
